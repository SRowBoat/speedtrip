<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Speedometer & Trip Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 380px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        .gauge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        #speedometer {
            width: 280px;
            height: 200px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex: 1;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
        }
        .lock-indicator {
            text-align: center;
            margin: 15px 0;
            font-size: 12px;
            font-weight: bold;
            color: #007aff;
            background: #e6f2ff;
            padding: 6px;
            border-radius: 20px;
            border: 1px dashed #007aff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .comparison-box {
            background-color: #e8f2ff;
            border: 1px solid #b3d7ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
        }
        .comparison-box h3 {
            margin-top: 0;
            font-size: 16px;
            color: #0056b3;
        }
        .stat-line {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
        }
        .result-highlight {
            font-size: 20px;
            font-weight: bold;
            color: #d9383a;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Motion & Time Saved Calculator</h2>
    
    <div class="gauge-container">
        <svg id="speedometer" viewBox="0 0 200 150">
            <path d="M 20 130 A 80 80 0 0 1 180 130" fill="none" stroke="#e0e0e0" stroke-width="12" stroke-linecap="round"/>
            
            <text x="18" y="145" font-size="10" text-anchor="middle" fill="#777">0</text>
            <text x="30" y="85" font-size="10" text-anchor="middle" fill="#777">40</text>
            <text x="70" y="42" font-size="10" text-anchor="middle" fill="#777">80</text>
            <text x="130" y="42" font-size="10" text-anchor="middle" fill="#777">120</text>
            <text x="170" y="85" font-size="10" text-anchor="middle" fill="#777">160</text>
            <text x="182" y="145" font-size="10" text-anchor="middle" fill="#777">200</text>
            
            <text x="100" y="95" id="gaugeSpeedNum" font-size="24" font-weight="bold" text-anchor="middle" fill="#111">60</text>
            <text x="100" y="110" font-size="9" font-weight="600" text-anchor="middle" fill="#777" letter-spacing="0.5">KM/H</text>
            <text x="100" y="130" id="gaugeTimeNum" font-size="11" font-weight="bold" text-anchor="middle" fill="#007aff">60 min</text>
            
            <circle cx="100" cy="130" r="6" fill="#333"/>
            
            <line id="needle" x1="100" y1="130" x2="100" y2="55" stroke="#ff3b30" stroke-width="3" stroke-linecap="round" transform="rotate(-54 100 130)"/>
        </svg>
    </div>

    <div class="input-group">
        <label for="distance">Distance to Destination (km)</label>
        <input type="number" id="distance" value="60" step="any" min="0">
        <div class="note">Changing this updates Duration of Trip</div>
    </div>

    <div class="lock-indicator">
        🔒 Locked by Current Speed
    </div>

    <div class="input-group">
        <label for="time">Duration of Trip (Minutes)</label>
        <input type="number" id="time" value="60" step="any" min="0">
        <div class="note">Changing this updates Distance to Destination</div>
    </div>

    <div class="input-group" style="margin-top: 25px;">
        <label for="speed">Adjust Speed Slider:</label>
        <div class="slider-container">
            <input type="range" id="speed" min="1" max="200" value="60">
        </div>
    </div>

    <div class="comparison-box">
        <h3>Time Saved Comparison</h3>
        <div class="input-group" style="margin-bottom: 15px;">
            <label for="baseSpeed">Compare against a Baseline Limit:</label>
            <select id="baseSpeed">
                <option value="15">School Zone / Shared Space (15 km/h)</option>
                <option value="30">Residential Limit (30 km/h)</option>
                <option value="40">Urban Limit (40 km/h)</option>
                <option value="60">Arterial Road (60 km/h)</option>
                <option value="100" selected>Highway Speed (100 km/h)</option>
            </select>
        </div>
        
        <div class="stat-line">
            <strong>Baseline Trip Duration:</strong>
            <div id="baseTimeResult">36 minutes</div>
        </div>

        <div class="stat-line" style="margin-top: 15px;">
            <strong>Time Difference at Current Speed:</strong>
            <div id="timeSavedResult" class="result-highlight">0 minutes</div>
        </div>
    </div>
</div>

<script>
    const speedSlider = document.getElementById('speed');
    const timeInput = document.getElementById('time');
    const distanceInput = document.getElementById('distance');
    const baseSpeedInput = document.getElementById('baseSpeed');
    const baseTimeResult = document.getElementById('baseTimeResult');
    const timeSavedResult = document.getElementById('timeSavedResult');
    
    // Gauge Specific Elements
    const needle = document.getElementById('needle');
    const gaugeSpeedNum = document.getElementById('gaugeSpeedNum');
    const gaugeTimeNum = document.getElementById('gaugeTimeNum');

    function round(num) {
        return Math.round((num + Number.EPSILON) * 100) / 100;
    }

    // Maps 0-200 km/h to a physical degree sweep (-90 deg to +90 deg)
    function updateGauge(speed, minutes) {
        gaugeSpeedNum.textContent = Math.round(speed);
        gaugeTimeNum.textContent = `${round(minutes)} min`;
        
        // Safety clamp speed representation between 0 and 200
        const clampedSpeed = Math.min(Math.max(speed, 0), 200);
        
        // Calibrating the physical angle: 0 km/h is -90deg, 200 km/h is +90deg
        const angle = (clampedSpeed / 200) * 180 - 90;
        needle.setAttribute('transform', `rotate(${angle} 100 130)`);
    }

    function calculateTimeSaved() {
        const currentSpeed = parseFloat(speedSlider.value);
        const baseSpeed = parseFloat(baseSpeedInput.value);
        const distance = parseFloat(distanceInput.value);
        const mins = parseFloat(timeInput.value) || 0;

        // Update the dashboard visual elements
        updateGauge(currentSpeed, mins);

        if (currentSpeed > 0 && baseSpeed > 0 && distance > 0) {
            const timeAtBase = (distance / baseSpeed) * 60;
            const timeAtCurrent = (distance / currentSpeed) * 60;
            const saved = timeAtBase - timeAtCurrent;

            baseTimeResult.textContent = `${round(timeAtBase)} minutes`;

            if (saved > 0) {
                timeSavedResult.textContent = `${round(saved)} minutes sooner`;
                timeSavedResult.style.color = "#28a745";
            } else if (saved < 0) {
                timeSavedResult.textContent = `${round(Math.abs(saved))} minutes slower`;
                timeSavedResult.style.color = "#d9383a";
            } else {
                timeSavedResult.textContent = "0 minutes (Speeds are equal)";
                timeSavedResult.style.color = "#555";
            }
        } else {
            baseTimeResult.textContent = "0 minutes";
            timeSavedResult.textContent = "0 minutes";
            timeSavedResult.style.color = "#555";
        }
    }

    // Event 1: Speed Slider Updates
    speedSlider.addEventListener('input', () => {
        const speed = parseFloat(speedSlider.value);
        const distance = parseFloat(distanceInput.value) || 0;
        
        if (speed > 0) {
            timeInput.value = round((distance / speed) * 60);
        }
        calculateTimeSaved();
    });

    // Event 2: Duration Input Updates
    timeInput.addEventListener('input', () => {
        const speed = parseFloat(speedSlider.value);
        const mins = parseFloat(timeInput.value);
        
        if (!isNaN(mins)) {
            distanceInput.value = round(speed * (mins / 60));
            calculateTimeSaved();
        }
    });

    // Event 3: Distance Input Updates
    distanceInput.addEventListener('input', () => {
        const speed = parseFloat(speedSlider.value);
        const distance = parseFloat(distanceInput.value);
        
        if (!isNaN(distance) && speed > 0) {
            timeInput.value = round((distance / speed) * 60);
            calculateTimeSaved();
        }
    });

    // Event 4: Dropdown Selection Changes
    baseSpeedInput.addEventListener('change', () => {
        calculateTimeSaved();
    });

    // Initialize calculation on load
    calculateTimeSaved();
</script>

</body>
</html>
